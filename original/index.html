<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="STACK!">
<link rel="manifest" href="#" id="manifest-link">
<title>STACK! — CICF AI Challenge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #07071a;
    --surface: #0f0f2e;
    --accent: #00f5c4;
    --accent2: #ff4db8;
    --accent3: #ffe14d;
    --text: #e8e8ff;
    --muted: #6666aa;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Syne', sans-serif;
    color: var(--text);
    touch-action: none;
    user-select: none;
  }

  #app {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ---- SCREENS ---- */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(.75rem, 3vw, 1.5rem);
    padding: 1.5rem clamp(1rem, 5vw, 2rem);
    opacity: 0;
    pointer-events: none;
    transition: opacity .35s;
    z-index: 10;
    overflow: hidden;
  }
  .screen.active { opacity: 1; pointer-events: all; }

  /* HOME */
  #home-screen {
    background: var(--bg);
  }
  .logo-wrap {
    text-align: center;
    line-height: 1;
    width: 100%;
    overflow: hidden;
    padding: 0 1rem;
  }
  .logo-stack {
    font-size: clamp(2.2rem, 14vw, 9rem);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: pulse-logo 2s ease-in-out infinite alternate;
    display: block;
  }
  @keyframes pulse-logo {
    from { filter: drop-shadow(0 0 20px rgba(0,245,196,.4)); }
    to   { filter: drop-shadow(0 0 40px rgba(255,77,184,.6)); }
  }
  .logo-sub {
    font-family: 'Space Mono', monospace;
    font-size: clamp(.6rem, 2.5vw, .75rem);
    letter-spacing: clamp(.05em, 1.5vw, .3em);
    color: var(--muted);
    margin-top: .5rem;
    white-space: nowrap;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: .1em;
    padding: .85rem 2.5rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .btn:active { transform: scale(.96); }
  .btn-primary {
    background: var(--accent);
    color: #07071a;
    box-shadow: 0 0 30px rgba(0,245,196,.3);
  }
  .btn-primary:hover { box-shadow: 0 0 50px rgba(0,245,196,.5); }
  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--muted);
  }
  .how-to {
    font-family: 'Space Mono', monospace;
    font-size: clamp(.7rem, 2.5vw, .8rem);
    color: var(--muted);
    text-align: center;
    line-height: 1.9;
    max-width: 90vw;
    word-break: break-word;
  }
  .how-to span { color: var(--accent); }

  /* GAME OVER */
  #gameover-screen { background: rgba(7,7,26,.95); backdrop-filter: blur(10px); }
  .go-title {
    font-size: clamp(2rem, 8vw, 4rem);
    font-weight: 800;
    color: var(--accent2);
    text-align: center;
    text-transform: uppercase;
  }
  .go-score-wrap { text-align: center; }
  .go-label {
    font-family: 'Space Mono', monospace;
    font-size: .75rem;
    letter-spacing: .3em;
    color: var(--muted);
    margin-bottom: .25rem;
  }
  .go-score {
    font-size: clamp(3rem, 12vw, 6rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .go-best {
    font-family: 'Space Mono', monospace;
    font-size: .85rem;
    color: var(--muted);
  }
  .go-best span { color: var(--accent3); }

  /* ---- CANVAS ---- */
  #gameCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* HUD */
  #hud {
    position: absolute;
    top: 1rem;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 0 1.25rem;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity .3s;
  }
  #hud.visible { opacity: 1; }
  .hud-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .hud-label {
    font-family: 'Space Mono', monospace;
    font-size: .6rem;
    letter-spacing: clamp(.05em, 1vw, .25em);
    color: var(--muted);
  }
  .hud-val {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.6rem;
    line-height: 1;
    color: var(--text);
  }
  #hud-score { color: var(--accent); }
  #hud-best  { color: var(--accent3); }

  /* tap hint */
  #tap-hint {
    position: absolute;
    bottom: 5rem;
    left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: clamp(.6rem, 2vw, .75rem);
    letter-spacing: clamp(.05em, 1vw, .2em);
    color: var(--muted);
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    white-space: nowrap;
    animation: blink 1.5s ease-in-out infinite;
  }
  #tap-hint.visible { opacity: 1; }
  @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }

  /* CICF badge */
  .cicf-badge {
    position: absolute;
    bottom: .75rem;
    left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: clamp(.5rem, 1.5vw, .6rem);
    letter-spacing: clamp(.05em, 1vw, .2em);
    color: var(--muted);
    opacity: .5;
    z-index: 5;
    pointer-events: none;
    white-space: nowrap;
  }

  /* particles */
  #particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 2;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: particle-fly linear forwards;
  }
  @keyframes particle-fly {
    from { transform: translateY(0) scale(1); opacity: 1; }
    to   { transform: translateY(-200px) scale(0); opacity: 0; }
  }
</style>
</head>
<body>

<div id="app">
  <canvas id="gameCanvas"></canvas>
  <div id="particles"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-box">
      <div class="hud-label">PONTOS</div>
      <div class="hud-val" id="hud-score">0</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">RECORD</div>
      <div class="hud-val" id="hud-best">0</div>
    </div>
  </div>

  <div id="tap-hint">TAP / SPACE PARA PARAR</div>

  <!-- HOME -->
  <div class="screen active" id="home-screen">
    <div class="logo-wrap">
      <div class="logo-stack">STACK!</div>
      <div class="logo-sub">CICF × AI CHALLENGE</div>
    </div>
    <div class="how-to">
      <span>[ TAP ]</span> ou <span>[ ESPAÇO ]</span> para parar o bloco<br>
      empilha o mais alto possível<br>
      pontua pela régua de alinhamento<br>
      sobe → fica mais rápido!
    </div>
    <button class="btn btn-primary" id="start-btn">JOGAR</button>
  </div>

  <!-- GAME OVER -->
  <div class="screen" id="gameover-screen">
    <div class="go-title">TORRE<br>CAIU!</div>
    <div class="go-score-wrap">
      <div class="go-label">PONTUAÇÃO</div>
      <div class="go-score" id="go-score">0</div>
    </div>
    <div class="go-best" id="go-best-line">RECORD: <span id="go-best">0</span></div>
    <button class="btn btn-primary" id="restart-btn">JOGAR DE NOVO</button>
    <button class="btn btn-secondary" id="home-btn">INÍCIO</button>
  </div>

  <div class="cicf-badge">CICF × CLAUDE.AI × 2025</div>
</div>

<script>
// =============================================
//  STACK! — CICF AI CHALLENGE GAME
// =============================================

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// Screens / UI
const homeScreen     = document.getElementById('home-screen');
const gameoverScreen = document.getElementById('gameover-screen');
const hud            = document.getElementById('hud');
const hudScore       = document.getElementById('hud-score');
const hudBest        = document.getElementById('hud-best');
const tapHint        = document.getElementById('tap-hint');
const goScore        = document.getElementById('go-score');
const goBest         = document.getElementById('go-best');
const particles      = document.getElementById('particles');

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);
document.getElementById('home-btn').addEventListener('click', showHome);

// ---- Constants ----
const BLOCK_H         = 40;       // block height px
const BASE_H          = 60;       // base platform height
const RULER_H         = 48;       // scoring ruler height
const INITIAL_W       = 200;      // first block width
const MIN_W           = 30;       // minimum block width before game over
const SPEED_BASE      = 2.8;      // initial speed
const SPEED_INC       = 0.22;     // speed per level
const STACK_TRIM      = 12;       // px trimmed each side on perfect-ish hits
const SCROLL_SPEED    = 2.5;      // px per frame stack scrolls up

// Palette
const COLORS = [
  '#00f5c4','#ff4db8','#ffe14d','#4da6ff','#ff7b4d',
  '#b44dff','#4dffb4','#ff4d4d','#4dfff0','#ffcc4d'
];

// ---- State ----
let state = 'home'; // home | playing | gameover
let stack = [];
let moving = null;
let score = 0;
let best  = parseInt(localStorage.getItem('cicf-stack-best') || '0');
let level = 0;
let raf   = null;
let stackOffsetY = 0;
let flashAlpha = 0;
let flashColor = '#fff';
let shakeX = 0;
let shakeY = 0;
let cameraY = 0; // how far camera has moved up

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { resize(); });
resize();

// =============================================
//  GAME LOGIC
// =============================================

function startGame() {
  showScreen(null);
  hud.classList.add('visible');
  tapHint.classList.add('visible');

  score = 0;
  level = 0;
  cameraY = 0;
  stack = [];
  shakeX = 0; shakeY = 0;

  hudScore.textContent = '0';
  hudBest.textContent  = best;

  state = 'playing';

  // Base platform
  const baseW = Math.min(canvas.width * .7, 280);
  stack.push({
    x: (canvas.width - baseW) / 2,
    y: groundY() - BLOCK_H,
    w: baseW,
    h: BLOCK_H,
    color: '#2a2a5a',
    isBase: true
  });

  spawnMoving();
  cancelAnimationFrame(raf);
  loop();
}

function groundY() {
  return canvas.height - BASE_H - RULER_H;
}

function spawnMoving() {
  const prev = stack[stack.length - 1];
  const newW  = Math.max(prev.w - (level === 0 ? 0 : STACK_TRIM + Math.floor(Math.random()*8)), MIN_W);
  const direction = level % 2 === 0 ? 1 : -1; // 1 = left to right, -1 = right to left

  const targetY = prev.y - BLOCK_H - (level === 0 ? 0 : 0);
  const color = COLORS[level % COLORS.length];

  moving = {
    x: direction === 1 ? -newW - 20 : canvas.width + 20,
    y: targetY,
    w: newW,
    h: BLOCK_H,
    color,
    dir: direction,
    speed: SPEED_BASE + level * SPEED_INC
  };

  setTimeout(() => { tapHint.classList.add('visible'); }, 300);
}

function getSpeed() {
  return SPEED_BASE + level * SPEED_INC;
}

function placeBlock() {
  if (!moving || state !== 'playing') return;
  tapHint.classList.remove('visible');

  const prev = stack[stack.length - 1];

  // Overlap calculation
  const left  = Math.max(moving.x, prev.x);
  const right = Math.min(moving.x + moving.w, prev.x + prev.w);
  const overlap = right - left;

  if (overlap <= 0) {
    // MISS
    triggerMiss();
    return;
  }

  // Score from ruler alignment
  const movingCenter = moving.x + moving.w / 2;
  const prevCenter   = prev.x + prev.w / 2;
  const offset = Math.abs(movingCenter - prevCenter);
  const maxOffset = prev.w / 2;
  const pts = level === 0 ? 10 : Math.max(1, Math.round(50 * (1 - offset / maxOffset)));

  score += pts;
  level++;
  if (score > best) {
    best = score;
    localStorage.setItem('cicf-stack-best', best);
  }
  hudScore.textContent = score;
  hudBest.textContent  = best;

  // Perfect hit
  const isPerfect = offset < 8;

  // Place trimmed block
  const placed = {
    x: left,
    y: moving.y,
    w: overlap,
    h: BLOCK_H,
    color: moving.color,
    pts,
    ptsAlpha: 1,
    isPerfect
  };
  stack.push(placed);

  // particles
  spawnParticles(moving.x + moving.w/2, worldToScreen(moving.y), moving.color, isPerfect ? 16 : 6);

  // Flash
  flashAlpha = isPerfect ? .35 : .15;
  flashColor = isPerfect ? '#ffe14d' : moving.color;

  // Camera: scroll up so top of stack stays visible
  scrollCamera();
  spawnMoving();
}

function worldToScreen(y) {
  return y + cameraY;
}

function scrollCamera() {
  const topBlock = stack[stack.length - 1];
  const screenY  = topBlock.y + cameraY;
  const threshold = canvas.height * 0.45;
  if (screenY < threshold) {
    cameraY += threshold - screenY;
  }
}

function triggerMiss() {
  state = 'gameover';
  shakeX = 12; shakeY = 8;
  flashAlpha = .7; flashColor = '#ff4db8';
  spawnParticles(canvas.width/2, canvas.height/2, '#ff4db8', 25);

  setTimeout(() => {
    hud.classList.remove('visible');
    tapHint.classList.remove('visible');
    goScore.textContent = score;
    goBest.textContent  = best;
    showScreen('gameover');
  }, 900);
}

// =============================================
//  RENDERING
// =============================================

function loop() {
  raf = requestAnimationFrame(loop);
  update();
  render();
}

function update() {
  if (state !== 'playing') return;

  // Move block
  if (moving) {
    moving.x += moving.dir * moving.speed;
    // Bounce
    if (moving.x + moving.w > canvas.width + 60) moving.dir = -1;
    if (moving.x < -moving.w - 60) moving.dir = 1;
  }

  // Decay effects
  if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - .025);
  if (shakeX > 0.2)  shakeX *= .78;
  else shakeX = 0;
  if (shakeY > 0.2)  shakeY *= .78;
  else shakeY = 0;

  // Decay pts labels
  for (const b of stack) {
    if (b.ptsAlpha > 0) b.ptsAlpha -= 0.022;
  }
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#07071a');
  grad.addColorStop(1, '#0d0d30');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // subtle grid
  drawGrid();

  const sx = shakeX * (Math.random()-.5)*2;
  const sy = shakeY * (Math.random()-.5)*2;

  ctx.save();
  ctx.translate(sx, sy);

  // Stack blocks
  for (const b of stack) {
    if (b.isBase) continue;
    const screenY = b.y + cameraY;
    if (screenY > canvas.height + 10 || screenY + b.h < -10) continue;

    // Glow
    ctx.shadowColor  = b.color;
    ctx.shadowBlur   = 10;
    ctx.fillStyle    = b.color;
    ctx.fillRect(b.x, screenY, b.w, b.h);

    // Top highlight
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,.18)';
    ctx.fillRect(b.x, screenY, b.w, 4);

    // Score popup
    if (b.ptsAlpha > 0 && b.pts) {
      ctx.globalAlpha = Math.min(1, b.ptsAlpha * 3);
      ctx.font = 'bold 18px Syne, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = b.isPerfect ? '#ffe14d' : '#fff';
      const float = (1 - b.ptsAlpha) * 40;
      ctx.fillText((b.isPerfect ? '★ ' : '') + b.pts, b.x + b.w/2, screenY - float);
      ctx.globalAlpha = 1;
    }
  }

  ctx.shadowBlur = 0;

  // Moving block
  if (moving && state === 'playing') {
    const screenY = moving.y + cameraY;

    // Ghost / trail
    ctx.globalAlpha = .12;
    ctx.fillStyle = moving.color;
    ctx.fillRect(moving.x, screenY + 6, moving.w, moving.h);
    ctx.globalAlpha = 1;

    // Block
    ctx.shadowColor = moving.color;
    ctx.shadowBlur  = 18;
    ctx.fillStyle   = moving.color;
    ctx.fillRect(moving.x, screenY, moving.w, moving.h);
    ctx.shadowBlur = 0;

    // Top highlight
    ctx.fillStyle = 'rgba(255,255,255,.25)';
    ctx.fillRect(moving.x, screenY, moving.w, 4);

    // Speed lines
    if (moving.speed > 4) {
      const lines = Math.floor(moving.speed / 2);
      ctx.globalAlpha = .08;
      ctx.fillStyle = moving.color;
      for (let i = 0; i < lines; i++) {
        const lx = moving.dir > 0 ? moving.x - (i+1)*18 : moving.x + moving.w + (i+1)*18;
        ctx.fillRect(lx, screenY + 8, 12, moving.h - 16);
      }
      ctx.globalAlpha = 1;
    }

    // Alignment guide (dotted line from prev top)
    const prev = stack[stack.length - 1];
    const prevScreenY = prev.y + cameraY;
    ctx.setLineDash([4, 6]);
    ctx.strokeStyle = 'rgba(255,255,255,.1)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(prev.x, prevScreenY);
    ctx.lineTo(prev.x, canvas.height);
    ctx.moveTo(prev.x + prev.w, prevScreenY);
    ctx.lineTo(prev.x + prev.w, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Base + ruler
  drawBase();

  // Flash
  if (flashAlpha > 0) {
    ctx.fillStyle = flashColor;
    ctx.globalAlpha = flashAlpha;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(255,255,255,.03)';
  ctx.lineWidth = 1;
  const step = 40;
  for (let x = 0; x < canvas.width; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = (cameraY % step); y < canvas.height; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
}

function drawBase() {
  const gy = groundY();
  const W  = canvas.width;

  // Ground platform
  const gGrad = ctx.createLinearGradient(0, gy + BLOCK_H, 0, canvas.height);
  gGrad.addColorStop(0, '#1a1a3a');
  gGrad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, gy + BLOCK_H, W, canvas.height - gy - BLOCK_H);

  // Base block
  const prev = stack.length > 0 ? stack[stack.length - 1] : null;
  const base = stack[0];
  if (base) {
    ctx.fillStyle = '#2a2a5a';
    ctx.fillRect(base.x, gy, base.w, BLOCK_H);
    ctx.fillStyle = 'rgba(255,255,255,.05)';
    ctx.fillRect(base.x, gy, base.w, 3);
  }

  // Scoring ruler
  const rulerY = gy + BLOCK_H;
  const rulerGrad = ctx.createLinearGradient(0, rulerY, 0, rulerY + RULER_H);
  rulerGrad.addColorStop(0, '#111130');
  rulerGrad.addColorStop(1, '#07071a');
  ctx.fillStyle = rulerGrad;
  ctx.fillRect(0, rulerY, W, RULER_H);

  // Ruler center line
  const cx = W / 2;

  // Ruler gradient zones
  const rGrad = ctx.createLinearGradient(cx - 100, 0, cx + 100, 0);
  rGrad.addColorStop(0,   'rgba(0,245,196,0)');
  rGrad.addColorStop(0.3, 'rgba(0,245,196,.15)');
  rGrad.addColorStop(0.5, 'rgba(0,245,196,.35)');
  rGrad.addColorStop(0.7, 'rgba(0,245,196,.15)');
  rGrad.addColorStop(1,   'rgba(0,245,196,0)');
  ctx.fillStyle = rGrad;
  ctx.fillRect(cx - 100, rulerY, 200, RULER_H);

  // Ruler tick marks
  ctx.strokeStyle = 'rgba(255,255,255,.15)';
  ctx.lineWidth = 1;
  const tickSpacing = W / 20;
  for (let i = 0; i <= 20; i++) {
    const tx = i * tickSpacing;
    const isCenter = Math.abs(tx - cx) < 2;
    const h = isCenter ? RULER_H * .8 : (Math.abs(tx - cx) < tickSpacing * 2 ? RULER_H * .5 : RULER_H * .3);
    ctx.strokeStyle = isCenter ? 'rgba(0,245,196,.6)' : 'rgba(255,255,255,.12)';
    ctx.beginPath(); ctx.moveTo(tx, rulerY); ctx.lineTo(tx, rulerY + h); ctx.stroke();
  }

  // Ruler labels
  ctx.textAlign = 'center';
  ctx.font = 'bold 11px Space Mono, monospace';
  ctx.fillStyle = 'rgba(0,245,196,.8)';
  ctx.fillText('50', cx, rulerY + RULER_H - 10);
  ctx.fillStyle = 'rgba(255,255,255,.3)';
  ctx.fillText('10', cx - 80, rulerY + RULER_H - 10);
  ctx.fillText('10', cx + 80, rulerY + RULER_H - 10);
  ctx.fillText('30', cx - 45, rulerY + RULER_H - 10);
  ctx.fillText('30', cx + 45, rulerY + RULER_H - 10);

  // Moving block indicator on ruler
  if (moving && state === 'playing' && prev) {
    const mc = moving.x + moving.w / 2;
    const pc = prev.x + prev.w / 2;
    const delta = mc - cx;
    const indicX = Math.min(Math.max(mc, 20), W - 20);

    ctx.fillStyle = moving.color;
    ctx.shadowColor = moving.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(indicX, rulerY + 4);
    ctx.lineTo(indicX - 6, rulerY + 16);
    ctx.lineTo(indicX + 6, rulerY + 16);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Top border ruler
  ctx.fillStyle = 'rgba(255,255,255,.06)';
  ctx.fillRect(0, rulerY, W, 1);
}

// =============================================
//  PARTICLES
// =============================================
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const size = 4 + Math.random() * 8;
    const angle = Math.random() * Math.PI * 2;
    const dist = 20 + Math.random() * 80;
    const dur  = 400 + Math.random() * 600;
    el.style.cssText = `
      width:${size}px; height:${size}px;
      background:${color};
      left:${x + Math.cos(angle)*dist}px;
      top:${y + Math.sin(angle)*dist}px;
      animation-duration:${dur}ms;
      box-shadow: 0 0 6px ${color};
    `;
    particles.appendChild(el);
    setTimeout(() => el.remove(), dur);
  }
}

// =============================================
//  INPUT
// =============================================
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'playing') placeBlock();
    else if (state === 'home') startGame();
    else if (state === 'gameover') startGame();
  }
});

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (state === 'playing') placeBlock();
});

// =============================================
//  SCREEN MANAGEMENT
// =============================================
function showScreen(id) {
  homeScreen.classList.remove('active');
  gameoverScreen.classList.remove('active');
  if (id === 'gameover') gameoverScreen.classList.add('active');
  else if (id === 'home') homeScreen.classList.add('active');
}

function showHome() {
  state = 'home';
  hud.classList.remove('visible');
  tapHint.classList.remove('visible');
  cancelAnimationFrame(raf);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  showScreen('home');
}

// Init
showScreen('home');

// Draw static background on canvas while in home
function homeAnim() {
  if (state !== 'home' && state !== 'gameover') return;
  requestAnimationFrame(homeAnim);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const g = ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,'#07071a'); g.addColorStop(1,'#0d0d30');
  ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);
  drawGrid();
  drawBase();
}
homeAnim();
