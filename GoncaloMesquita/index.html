<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECH STACK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0c11;--surf:#13141b;--surf2:#1a1b24;
  --bord:rgba(255,255,255,0.07);
  --txt:#edeae0;--mut:rgba(237,234,224,0.36);
  --gold:#f5c842;--red:#ff3f5e;--grn:#3ecf8e;--blue:#5b8af5;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;overflow:hidden}
#bgcv{position:fixed;inset:0;z-index:0;pointer-events:none}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .28s}
.screen.hidden{opacity:0;pointer-events:none}
.scrollable{overflow-y:auto;justify-content:flex-start;padding:24px 0 60px}

.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,9vw,5.5rem);letter-spacing:.07em;color:var(--gold);line-height:1;text-shadow:0 0 60px rgba(245,200,66,.4)}
.sub{font-size:.62rem;letter-spacing:.26em;color:var(--mut);margin-top:4px;margin-bottom:34px}
.lbl{font-size:.56rem;letter-spacing:.22em;color:var(--mut)}

.btn{border:none;border-radius:6px;cursor:pointer;transition:transform .12s,box-shadow .12s,opacity .12s}
.gold{background:var(--gold);color:#0b0c11;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.12em;padding:13px 52px;box-shadow:0 0 30px rgba(245,200,66,.28)}
.gold:hover{transform:scale(1.04);box-shadow:0 0 50px rgba(245,200,66,.48)}
.ghost{background:transparent;border:1.5px solid var(--bord);color:var(--txt);font-family:'DM Mono',monospace;font-size:.78rem;letter-spacing:.1em;padding:10px 24px}
.ghost:hover{border-color:var(--gold);color:var(--gold)}

.nbox{display:flex;flex-direction:column;gap:7px;width:min(320px,86vw);margin-bottom:26px}
.nbox label{font-size:.58rem;letter-spacing:.2em;color:var(--mut)}
.nbox input{background:var(--surf2);border:1.5px solid var(--bord);border-radius:6px;color:var(--txt);font-family:'DM Mono',monospace;font-size:.92rem;padding:10px 14px;outline:none;transition:border-color .2s;width:100%}
.nbox input:focus{border-color:var(--gold)}

.lbwrap{width:min(320px,86vw);display:flex;flex-direction:column;gap:5px;margin-top:10px}
.lbrow{display:flex;align-items:center;gap:9px;background:var(--surf);border:1px solid var(--bord);border-radius:5px;padding:7px 13px;font-size:.73rem}
.lbrnk{color:var(--gold);width:14px;text-align:right;flex-shrink:0}
.lbnm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lbsc{color:var(--gold);font-weight:500;flex-shrink:0}

/* HUD */
#ghud{width:100%;display:flex;justify-content:space-between;align-items:center;padding:10px 16px 8px;border-bottom:1px solid var(--bord);flex-shrink:0;z-index:5;gap:8px}
.hbig{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--gold);letter-spacing:.05em;line-height:1}
.hsm{font-size:.5rem;letter-spacing:.18em;color:var(--mut);margin-bottom:1px}
.hcoins{display:flex;align-items:center;gap:4px;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--gold)}
.shopbtn{background:var(--surf2);border:1.5px solid var(--bord);border-radius:5px;color:var(--txt);font-family:'DM Mono',monospace;font-size:.64rem;letter-spacing:.1em;padding:5px 11px;cursor:pointer;transition:border-color .18s,color .18s;white-space:nowrap}
.shopbtn:hover{border-color:var(--gold);color:var(--gold)}
.hud-equip{display:flex;align-items:center;gap:6px}
.hud-equip-lbl{font-size:.46rem;letter-spacing:.14em;color:var(--mut)}
.hud-equip-name{font-size:.62rem;color:var(--txt)}

#cwrap{flex:1;width:100%;position:relative;overflow:hidden}
#gc{display:block;width:100%;height:100%;cursor:pointer}
#hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-size:.58rem;letter-spacing:.2em;color:var(--mut);pointer-events:none;white-space:nowrap;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.85}}
@keyframes coinpop{
  0%  {opacity:1;transform:translateX(-50%) translateY(0)   scale(1)}
  60% {opacity:1;transform:translateX(-50%) translateY(-28px) scale(1.15)}
  100%{opacity:0;transform:translateX(-50%) translateY(-52px) scale(.9)}
}
.speed-badge{font-size:.62rem;letter-spacing:.12em;padding:3px 9px;border-radius:4px;font-weight:600;white-space:nowrap;transition:all .3s}

.statrow{display:flex;gap:12px;margin:18px 0 26px;flex-wrap:wrap;justify-content:center}
.scard{background:var(--surf);border:1px solid var(--bord);border-radius:8px;padding:13px 22px;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:95px}
.snum{font-family:'Bebas Neue',sans-serif;font-size:2.7rem;color:var(--gold);line-height:1}
.slbl{font-size:.52rem;letter-spacing:.2em;color:var(--mut)}
.brow{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;justify-content:center}

/* SHOP */
#sshop{background:var(--bg)}
.shopwrap{width:min(540px,97vw);display:flex;flex-direction:column;align-items:center;padding-top:14px}
.shophead{display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:14px;padding:0 2px}
.shopcoins{display:flex;align-items:center;gap:7px;font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:var(--gold)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
@media(min-width:480px){.sgrid{grid-template-columns:1fr 1fr 1fr}}
.sitem{background:var(--surf);border:1px solid var(--bord);border-radius:9px;padding:13px 11px;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;transition:border-color .2s}
.sitem.owned{border-color:rgba(62,207,142,.3)}
.sitem.equipped{border-color:var(--gold);box-shadow:0 0 18px rgba(245,200,66,.18)}
.owned-badge{position:absolute;top:7px;right:8px;font-size:.44rem;letter-spacing:.1em;color:var(--grn);background:rgba(62,207,142,.12);border:1px solid rgba(62,207,142,.3);border-radius:3px;padding:2px 5px}
.equip-badge{position:absolute;top:7px;left:8px;font-size:.44rem;letter-spacing:.1em;color:#0b0c11;background:var(--gold);border-radius:3px;padding:2px 5px;font-weight:700}
.prevcv{border-radius:5px;background:var(--surf2)}
.sname{font-size:.66rem;letter-spacing:.09em;color:var(--txt);text-align:center}
.sdesc{font-size:.54rem;color:var(--mut);text-align:center;line-height:1.5}
.sprice{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--gold)}
.buybtn{background:var(--gold);color:#0b0c11;border:none;border-radius:5px;font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.1em;padding:6px 0;cursor:pointer;transition:opacity .15s,transform .1s;width:100%}
.buybtn:hover:not(:disabled){opacity:.82;transform:scale(1.03)}
.buybtn:disabled{opacity:.28;cursor:not-allowed}
.buybtn.isown{background:var(--surf2);color:var(--grn);border:1px solid rgba(62,207,142,.3)}
.buybtn.isown:hover{transform:none;opacity:1}
.buybtn.isequip{background:var(--gold);color:#0b0c11;opacity:.65;cursor:default}
.buybtn.isequip:hover{transform:none;opacity:.65}
.equip-btn{background:transparent;border:1.5px solid rgba(62,207,142,.5);color:var(--grn);border-radius:5px;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;padding:5px 0;cursor:pointer;transition:background .15s;width:100%}
.equip-btn:hover{background:rgba(62,207,142,.1)}
.sseclbl{font-size:.56rem;letter-spacing:.22em;color:var(--mut);align-self:flex-start;margin:10px 0 4px}
.rarity{font-size:.48rem;letter-spacing:.14em;padding:2px 7px;border-radius:3px;font-weight:600}
.r-common{color:#aaa;background:rgba(170,170,170,.1);border:1px solid rgba(170,170,170,.2)}
.r-rare{color:var(--blue);background:rgba(91,138,245,.1);border:1px solid rgba(91,138,245,.3)}
.r-epic{color:#c084fc;background:rgba(192,132,252,.1);border:1px solid rgba(192,132,252,.3)}
.r-legendary{color:var(--gold);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.4)}
</style>
</head>
<body>

<canvas id="bgcv"></canvas>

<!-- START -->
<div class="screen" id="sstart">
  <div class="logo">TECH STACK</div>
  <div class="sub">EMPILHA. COMPRA. DOMINA.</div>
  <div class="nbox"><label>O TEU NOME</label>
    <input type="text" id="pname" maxlength="18" placeholder="ex: João" autocomplete="off">
  </div>
  <button class="btn gold" id="bstart" style="margin-bottom:30px">▶ JOGAR</button>
  <div class="lbl" style="margin-bottom:10px">LEADERBOARD</div>
  <div class="lbwrap" id="lb0"></div>
</div>

<!-- GAME -->
<div class="screen hidden" id="sgame" style="justify-content:flex-start">
  <div id="ghud">
    <div><div class="hsm">PONTOS</div><div class="hbig" id="hscore">0</div></div>
    <div style="text-align:center"><div class="hsm">NÍVEL</div><div class="hbig" id="hlevel">1</div></div>
    <div class="hud-equip">
      <canvas id="hud-devcv" width="60" height="28"></canvas>
      <div><div class="hud-equip-lbl">EQUIPADO</div><div class="hud-equip-name" id="hud-devname">—</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div><div class="hsm">MOEDAS</div><div class="hcoins">🪙<span id="hcoins">0</span></div></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <span id="speed-badge" class="speed-badge" style="display:none"></span>
        <button class="shopbtn" id="bshophud">LOJA</button>
      </div>
    </div>
  </div>
  <div id="cwrap"><canvas id="gc"></canvas>
    <div id="hint">CLICA OU PRESSIONA ESPAÇO</div>
  </div>
</div>

<!-- SHOP -->
<div class="screen hidden scrollable" id="sshop">
  <div class="shopwrap">
    <div class="shophead">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.9rem;color:var(--gold);letter-spacing:.06em">🛒 LOJA</div>
      <div class="shopcoins">🪙<span id="shopcoinsdisp">0</span></div>
    </div>
    <div style="font-size:.58rem;letter-spacing:.15em;color:var(--mut);margin-bottom:14px;text-align:center">Compra e <b style="color:var(--gold)">EQUIPA</b> um dispositivo — a torre inteira será só desse objeto</div>
    <div class="sseclbl">DISPOSITIVOS</div>
    <div class="sgrid" id="shopgrid"></div>
    <button class="btn ghost" id="bshopclose" style="margin-top:24px;width:100%;max-width:280px">← VOLTAR</button>
  </div>
</div>

<!-- GAME OVER -->
<div class="screen hidden" id="sover">
  <div class="logo" style="color:var(--red);text-shadow:0 0 50px rgba(255,63,94,.4);font-size:clamp(2.4rem,8vw,4.5rem)">GAME OVER</div>
  <div style="font-size:.6rem;letter-spacing:.2em;color:var(--mut);margin:4px 0 16px" id="ovname">—</div>
  <div class="statrow">
    <div class="scard"><div class="snum" id="ovscore">0</div><div class="slbl">PONTOS</div></div>
    <div class="scard"><div class="snum" id="ovcoins">0</div><div class="slbl">MOEDAS GANHAS</div></div>
  </div>
  <div class="brow">
    <button class="btn ghost" id="bmenu">MENU</button>
    <button class="btn ghost" id="bshopover">LOJA</button>
    <button class="btn gold" id="bretry" style="margin-bottom:0">TENTAR DE NOVO</button>
  </div>
  <div class="lbl" style="margin-bottom:10px">LEADERBOARD</div>
  <div class="lbwrap" id="lb1"></div>
</div>

<script>
/* ══ SAVE ══ */
const SK='techstack_v7';
function ld(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch{return {};}}
function ws(d){localStorage.setItem(SK,JSON.stringify(d));}
let S=ld();
if(!S.coins) S.coins=0;
if(!S.owned) S.owned=['phone'];
if(!S.equipped) S.equipped='phone';
if(!S.lb) S.lb=[];
ws(S);

function addLB(name,score){S.lb.push({name:name||'Anónimo',score});S.lb.sort((a,b)=>b.score-a.score);S.lb=S.lb.slice(0,10);ws(S);}
function rendLB(id){
  const el=document.getElementById(id);
  if(!S.lb.length){el.innerHTML='<div style="font-size:.63rem;color:var(--mut);text-align:center;padding:12px 0">Sem pontuações ainda</div>';return;}
  el.innerHTML=S.lb.slice(0,6).map((e,i)=>`<div class="lbrow"><span class="lbrnk">${i+1}</span><span class="lbnm">${e.name}</span><span class="lbsc">${e.score}</span></div>`).join('');
}

/* ══ PALETTES ══ */
const PAL={
  red:   {body:'#e05555',screen:'#fff0f0',accent:'#ff9999',detail:'#ff4444'},
  gold:  {body:'#d4a017',screen:'#fffbe6',accent:'#ffe066',detail:'#c8860a'},
  blue:  {body:'#3a72d4',screen:'#eef4ff',accent:'#90caff',detail:'#5ba3ff'},
  green: {body:'#2e9e50',screen:'#edfff4',accent:'#7ce8a0',detail:'#3ecf6e'},
  purple:{body:'#7a40c8',screen:'#f5eeff',accent:'#d8a8ff',detail:'#b06aff'},
  silver:{body:'#7a8a96',screen:'#f0f4f8',accent:'#ccd8e0',detail:'#9ab0be'},
  dark:  {body:'#4a4a7a',screen:'#eeeeff',accent:'#aab0ff',detail:'#7070d0'},
  teal:  {body:'#1a9490',screen:'#e6fffd',accent:'#6ae8e2',detail:'#20bab4'},
  orange:{body:'#e05818',screen:'#fff4ee',accent:'#ffaa77',detail:'#ff6622'},
  white: {body:'#d0cec8',screen:'#ffffff',accent:'#f8f8f8',detail:'#b0a8a0'},
  rose:  {body:'#c0306a',screen:'#fff0f6',accent:'#ff88bb',detail:'#e0508a'},
  navy:  {body:'#2a4a9a',screen:'#eef2ff',accent:'#99bbff',detail:'#4466dd'},
  black: {body:'#5a5a7a',screen:'#ededff',accent:'#9999cc',detail:'#7070aa'},
  copper:{body:'#b06030',screen:'#fff5ee',accent:'#ffbb88',detail:'#d07840'},
  lime:  {body:'#6a9a10',screen:'#f4ffe6',accent:'#ccee44',detail:'#88bb20'},
};

const DEVPALS={
  phone:     ['red','blue','green','purple','gold','teal','orange','rose'],
  tablet:    ['silver','dark','blue','teal','navy'],
  laptop:    ['silver','dark','blue','black','white'],
  watch:     ['black','gold','teal','purple','dark'],
  headphones:['dark','purple','red','blue','black'],
  camera:    ['black','silver','dark','copper'],
  console:   ['black','dark','blue','purple'],
  tv:        ['black','dark','silver','navy'],
  router:    ['white','silver','dark','blue'],
  drone:     ['black','dark','orange','silver'],
  server:    ['dark','navy','black','silver'],
  satellite: ['silver','dark','navy','blue'],
  robot:     ['silver','dark','blue','lime'],
  hologram:  ['teal','blue','purple','dark'],
  spaceship: ['dark','silver','blue','black'],
};

/* ══ DRAW HELPERS ══ */
function rr(c,x,y,w,h,r){
  if(r<0)r=0;
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}
function shineGrad(c,x,y,w,h){
  const g=c.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,'rgba(255,255,255,.22)');g.addColorStop(.45,'rgba(255,255,255,.04)');g.addColorStop(1,'rgba(255,255,255,0)');return g;
}

/* ══ DEVICE DRAWERS ══ */
function drawPhone(c,x,y,w,h,p){
  const R=h*.35;
  rr(c,x,y,w,h,R);c.fillStyle=p.body;c.fill();
  rr(c,x+h*.22,y+h*.1,w-h*.55,h*.8,h*.08);c.fillStyle=p.screen;c.fill();
  rr(c,x+h*.22,y+h*.1,w-h*.55,h*.8,h*.08);c.fillStyle=shineGrad(c,x,y,w,h);c.fill();
  c.beginPath();c.arc(x+h*.13,y+h*.5,h*.09,0,Math.PI*2);c.fillStyle=p.accent;c.fill();
  c.beginPath();c.arc(x+h*.13,y+h*.5,h*.045,0,Math.PI*2);c.fillStyle='rgba(255,255,255,.6)';c.fill();
  rr(c,x+w-h*.15,y+h*.38,h*.06,h*.24,h*.03);c.fillStyle=p.detail;c.fill();
  rr(c,x+h*.05,y+h*.25,h*.04,h*.18,h*.02);c.fillStyle=p.detail;c.fill();
  rr(c,x+h*.05,y+h*.47,h*.04,h*.18,h*.02);c.fillStyle=p.detail;c.fill();
  rr(c,x,y,w,h,R);c.strokeStyle='rgba(255,255,255,.42)';c.lineWidth=.8;c.stroke();
}
function drawTablet(c,x,y,w,h,p){
  const R=h*.18;
  rr(c,x,y,w,h,R);c.fillStyle=p.body;c.fill();
  rr(c,x+h*.22,y+h*.08,w-h*.44,h*.84,h*.06);c.fillStyle=p.screen;c.fill();
  rr(c,x+h*.22,y+h*.08,w-h*.44,h*.84,h*.06);c.fillStyle=shineGrad(c,x,y,w,h);c.fill();
  c.beginPath();c.arc(x+h*.12,y+h*.5,h*.07,0,Math.PI*2);c.fillStyle=p.accent;c.fill();
  c.beginPath();c.arc(x+h*.12,y+h*.5,h*.035,0,Math.PI*2);c.fillStyle='rgba(255,255,255,.6)';c.fill();
  c.beginPath();c.arc(x+w-h*.12,y+h*.5,h*.08,0,Math.PI*2);c.fillStyle=p.detail;c.fill();
  c.beginPath();c.arc(x+w-h*.12,y+h*.5,h*.04,0,Math.PI*2);c.fillStyle=p.body;c.fill();
  rr(c,x,y,w,h,R);c.strokeStyle='rgba(255,255,255,.38)';c.lineWidth=.8;c.stroke();
}
function drawLaptop(c,x,y,w,h,p){
  rr(c,x,y+h*.55,w,h*.45,h*.06);c.fillStyle=p.body;c.fill();
  rr(c,x+w*.05,y+h*.6,w*.9,h*.27,h*.04);c.fillStyle=p.screen;c.fill();
  c.fillStyle=p.detail;
  for(let r=0;r<2;r++)for(let k=0;k<8;k++){rr(c,x+w*(.07+k*.12),y+h*(.63+r*.12),w*.1,h*.09,h*.02);c.fill();}
  rr(c,x+w*.35,y+h*.86,w*.3,h*.11,h*.03);c.fillStyle=p.accent;c.globalAlpha=.25;c.fill();c.globalAlpha=1;
  rr(c,x+w*.02,y,w*.96,h*.52,h*.06);c.fillStyle=p.body;c.fill();
  rr(c,x+w*.05,y+h*.04,w*.9,h*.44,h*.04);c.fillStyle=p.screen;c.fill();
  rr(c,x+w*.05,y+h*.04,w*.9,h*.44,h*.04);c.fillStyle=shineGrad(c,x,y,w,h);c.fill();
  c.beginPath();c.arc(x+w*.5,y+h*.04,h*.04,0,Math.PI*2);c.fillStyle=p.accent;c.globalAlpha=.55;c.fill();c.globalAlpha=1;
  c.fillStyle=p.detail;c.fillRect(x+w*.1,y+h*.525,w*.8,h*.03);
}
function drawWatch(c,x,y,w,h,p){
  rr(c,x,y+h*.25,w*.22,h*.5,h*.08);c.fillStyle=p.body;c.fill();
  rr(c,x+w*.78,y+h*.25,w*.22,h*.5,h*.08);c.fillStyle=p.body;c.fill();
  rr(c,x+w*.18,y+h*.05,w*.64,h*.9,h*.18);c.fillStyle=p.body;c.fill();
  rr(c,x+w*.22,y+h*.1,w*.56,h*.8,h*.14);c.fillStyle=p.screen;c.fill();
  rr(c,x+w*.22,y+h*.1,w*.56,h*.8,h*.14);c.fillStyle=shineGrad(c,x,y,w,h);c.fill();
  rr(c,x+w*.92,y+h*.38,w*.06,h*.24,h*.04);c.fillStyle=p.detail;c.fill();
  rr(c,x+w*.18,y+h*.05,w*.64,h*.9,h*.18);c.strokeStyle='rgba(255,255,255,.45)';c.lineWidth=.8;c.stroke();
}
function drawHeadphones(c,x,y,w,h,p){
  const cx=x+w/2,cy=y+h/2;
  c.beginPath();c.arc(cx,cy,w*.36,Math.PI,0,false);
  c.strokeStyle=p.body;c.lineWidth=h*.18;c.lineCap='round';c.stroke();
  rr(c,x+w*.04,cy-h*.1,w*.18,h*.55,h*.12);c.fillStyle=p.accent;c.fill();
  rr(c,x+w*.07,cy-h*.05,w*.12,h*.42,h*.09);c.fillStyle=p.screen;c.fill();
  rr(c,x+w*.78,cy-h*.1,w*.18,h*.55,h*.12);c.fillStyle=p.accent;c.fill();

function rendShop(){
  document.getElementById('shopcoinsdisp').textContent=S.coins;
  const grid=document.getElementById('shopgrid');
  grid.innerHTML='';
  CATALOGUE.forEach(item=>{
    const owned=S.owned.includes(item.id);
    const equipped=S.equipped===item.id;
    const afford=S.coins>=item.price;
    const div=document.createElement('div');
    div.className='sitem'+(owned?' owned':'')+(equipped?' equipped':'');

    // preview canvas
    const cv=document.createElement('canvas');
    cv.className='prevcv';cv.width=120;cv.height=52;div.appendChild(cv);
    setTimeout(()=>{
      const pc=cv.getContext('2d');
      const pals=DEVPALS[item.id];
      const pal=PAL[pals[0]];
      const pw=Math.min(114,44);const ph=24;
      const scale=Math.min(114/pw,48/ph);
      const fw=pw*scale,fh=ph*scale;
      DRAWERS[item.id](pc,(120-fw)/2,(52-fh)/2,fw,fh,pal);
    },0);

    const badges=(equipped?'<div class="equip-badge">EQUIPADO</div>':'')+(owned?'<div class="owned-badge">✓</div>':'');
    let btnHtml='';
    if(!owned){
      btnHtml=`<button class="buybtn" ${!afford?'disabled':''} data-id="${item.id}">${afford?'COMPRAR':'SEM MOEDAS'}</button>`;
    } else if(equipped){
      btnHtml=`<button class="buybtn isequip" disabled>✓ EQUIPADO</button>`;
    } else {
      btnHtml=`<button class="equip-btn" data-equip="${item.id}">⚡ EQUIPAR</button>`;
    }
    div.innerHTML+=`${badges}
      <div class="sname">${item.name}</div>
      <span class="rarity ${RARITY_CLASS[item.rarity]}">${RARITY_LABEL[item.rarity]}</span>
      <div class="sdesc">${item.desc}</div>
      ${!owned?`<div class="sprice">🪙 ${item.price.toLocaleString()}</div>`:''}
      ${btnHtml}`;
    grid.appendChild(div);
  });
  grid.querySelectorAll('.buybtn:not(.isequip):not([disabled])').forEach(b=>b.addEventListener('click',()=>buyItem(b.dataset.id)));
  grid.querySelectorAll('.equip-btn').forEach(b=>b.addEventListener('click',()=>equipItem(b.dataset.equip)));
}

function buyItem(id){
  if(S.owned.includes(id))return;
  const item=CATALOGUE.find(c=>c.id===id);
  if(!item||S.coins<item.price)return;
  S.coins-=item.price;S.owned.push(id);S.equipped=id;ws(S);
  rendShop();updHUD();
}
function equipItem(id){
  if(!S.owned.includes(id))return;
  S.equipped=id;ws(S);
  rendShop();updHUD();
}

let palIdx=0;

function equippedDev(){return CATALOGUE.find(c=>c.id===S.equipped)||CATALOGUE[0];}
function nextPal(devId){
  const pals=DEVPALS[devId];
  // pick a random palette from the device's list, different from last used
  const idx=Math.floor(Math.random()*pals.length);
  return PAL[pals[idx]];
}

/* ══ BACKGROUND STARFIELD ══ */
const bgCv=document.getElementById('bgcv');
const bgCtx=bgCv.getContext('2d');
let stars=[];
let nebula=[];
let bgW=0,bgH=0;
let bgRaf=null;
let bgT=0;

function initBG(){
  bgW=bgCv.width=window.innerWidth;
  bgH=bgCv.height=window.innerHeight;
  // stars
  stars=Array.from({length:220},()=>({
    x:Math.random()*bgW, y:Math.random()*bgH,
    r:Math.random()*1.4+0.2,
    base:Math.random(),
    speed:Math.random()*0.6+0.2,
    twinkle:Math.random()*Math.PI*2,
  }));
  // nebula blobs
  nebula=[
    {x:bgW*.15,y:bgH*.25,rx:bgW*.28,ry:bgH*.22,c:'rgba(91,50,180,',a:.13},
    {x:bgW*.82,y:bgH*.55,rx:bgW*.22,ry:bgH*.3, c:'rgba(15,80,180,', a:.11},
    {x:bgW*.5, y:bgH*.7, rx:bgW*.35,ry:bgH*.18,c:'rgba(180,30,90,', a:.08},
    {x:bgW*.65,y:bgH*.18,rx:bgW*.18,ry:bgH*.22,c:'rgba(20,130,160,',a:.10},
  ];
  if(!bgRaf) bgLoop();
}
function bgLoop(){
  bgT+=0.012;
  // deep space gradient
  const grd=bgCtx.createRadialGradient(bgW*.5,bgH*.4,0,bgW*.5,bgH*.5,bgW*.8);
  grd.addColorStop(0,'#0e0b1e');
  grd.addColorStop(.5,'#07091a');
  grd.addColorStop(1,'#030408');
  bgCtx.fillStyle=grd;
  bgCtx.fillRect(0,0,bgW,bgH);

  // nebula
  nebula.forEach(n=>{
    const g=bgCtx.createRadialGradient(n.x,n.y,0,n.x,n.y,Math.max(n.rx,n.ry));
    const pulse=Math.sin(bgT*0.4)*0.03;
    g.addColorStop(0,n.c+(n.a+pulse)+')');
    g.addColorStop(.5,n.c+(n.a*.4)+')');
    g.addColorStop(1,'rgba(0,0,0,0)');
    bgCtx.save();
    bgCtx.scale(1,n.ry/n.rx);
    bgCtx.beginPath();bgCtx.arc(n.x,n.y*n.rx/n.ry,n.rx,0,Math.PI*2);
    bgCtx.fillStyle=g;bgCtx.fill();bgCtx.restore();
  });

  // stars with twinkle
  stars.forEach(s=>{
    s.twinkle+=s.speed*0.04;
    const alpha=s.base*.5+Math.abs(Math.sin(s.twinkle))*0.8;
    const r=s.r*(0.7+Math.abs(Math.sin(s.twinkle))*.5);
    // glow
    const sg=bgCtx.createRadialGradient(s.x,s.y,0,s.x,s.y,r*4);
    sg.addColorStop(0,`rgba(220,230,255,${alpha*.5})`);
    sg.addColorStop(1,'rgba(0,0,0,0)');
    bgCtx.beginPath();bgCtx.arc(s.x,s.y,r*4,0,Math.PI*2);bgCtx.fillStyle=sg;bgCtx.fill();
    // core
    bgCtx.beginPath();bgCtx.arc(s.x,s.y,r,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(245,248,255,${alpha})`;bgCtx.fill();
  });

  // subtle horizon glow at bottom
  const hg=bgCtx.createLinearGradient(0,bgH*.75,0,bgH);
  hg.addColorStop(0,'rgba(0,0,0,0)');
  hg.addColorStop(.5,'rgba(60,20,120,.06)');
  hg.addColorStop(1,'rgba(40,10,90,.14)');
  bgCtx.fillStyle=hg;bgCtx.fillRect(0,bgH*.75,bgW,bgH*.25);

  // floating dust particles
  bgCtx.save();
  for(let i=0;i<18;i++){
    const px=((bgW*(.1+i*.052)+bgT*8*(i%2===0?1:-1))%bgW+bgW)%bgW;
    const py=((bgH*(.08+i*.05)+bgT*3)%(bgH*1.1));
    const pa=Math.abs(Math.sin(bgT*.3+i))*0.25;
    bgCtx.beginPath();bgCtx.arc(px,py,0.8,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(180,160,255,${pa})`;bgCtx.fill();
  }
  bgCtx.restore();

  bgRaf=requestAnimationFrame(bgLoop);
}


function resize(){
  const wr=document.getElementById('cwrap');
  W=wr.clientWidth;H=wr.clientHeight;
  canvas.width=W;canvas.height=H;
}

const BASE_W=()=>Math.min(W*0.36,150);
const BLOCK_H=58;

function initGame(){
  resize();
  score=0;coinsEarned=0;speed=2.6;dir=1;scrollY=0;
  stackBlocks=[];mover=null;particles=[];pFlash=0;palIdx=0;lastLabelShown='';
  updHUD();
  const dev=equippedDev();
  const bw=BASE_W(),bh=BLOCK_H;
  const bx=(W-bw)/2,by=H-BASE_BOTTOM_PAD-bh;
  stackBlocks.push({wy:by,x:bx,w:bw,h:bh,devId:dev.id,pal:nextPal(dev.id)});
  spawnMover();
  running=true;
  document.getElementById('hint').style.display='block';
  cancelAnimationFrame(rafId);
  rafId=requestAnimationFrame(loop);
}

function spawnMover(){
  const top=stackBlocks[stackBlocks.length-1];
  const dev=equippedDev();
  const w=top.w,h=top.h;
  const wy=top.wy-h-GAP;
  const startX=dir===1?-w-10:W+10;
  mover={wy,x:startX,w,h,devId:dev.id,pal:nextPal(dev.id)};
}

function getTargetScrollY(){
  const top=stackBlocks[stackBlocks.length-1];
  return top.wy-H*TARGET_TOP_FRAC;
}
function toSY(wy){return wy-scrollY;}

function loop(){
  if(!running)return;
  mover.x+=speed*dir;
  if(dir===1&&mover.x>W+10)dir=-1;
  if(dir===-1&&mover.x<-mover.w-10)dir=1;
  const target=getTargetScrollY();
  scrollY+=(target-scrollY)*0.08;
  if(pFlash>0)pFlash--;
  draw();
  rafId=requestAnimationFrame(loop);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // guide lines
  if(stackBlocks.length){
    const t=stackBlocks[stackBlocks.length-1],sy=toSY(t.wy);
    ctx.save();ctx.setLineDash([3,9]);ctx.strokeStyle='rgba(245,200,66,.08)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(t.x,0);ctx.lineTo(t.x,sy+t.h);ctx.stroke();
    ctx.beginPath();ctx.moveTo(t.x+t.w,0);ctx.lineTo(t.x+t.w,sy+t.h);ctx.stroke();
    ctx.restore();
  }
  for(const b of stackBlocks){
    const sy=toSY(b.wy);if(sy+b.h<-20||sy>H+20)continue;
    ctx.save();ctx.shadowColor='rgba(0,0,0,.12)';ctx.shadowBlur=10;ctx.shadowOffsetY=4;
    DRAWERS[b.devId](ctx,b.x,sy,b.w,b.h,b.pal);ctx.restore();
  }
  if(mover){
    const sy=toSY(mover.wy);
    ctx.save();ctx.shadowColor='rgba(0,0,0,.08)';ctx.shadowBlur=8;ctx.shadowOffsetY=3;
    DRAWERS[mover.devId](ctx,mover.x,sy,mover.w,mover.h,mover.pal);ctx.restore();
  }
  if(pFlash>0){
    ctx.save();ctx.globalAlpha=(pFlash/32)*.28;ctx.fillStyle='#f5c842';ctx.fillRect(0,0,W,H);ctx.restore();
    if(pFlash>14){ctx.save();ctx.globalAlpha=(pFlash-14)/18;ctx.font='800 22px "Bebas Neue",sans-serif';ctx.fillStyle='#f5c842';ctx.textAlign='center';ctx.fillText('✦ PERFEITO! ✦',W/2,H*0.15);ctx.restore();}
  }
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=Math.max(0,p.life/100);
    DRAWERS[p.devId](ctx,-p.w/2,-p.h/2,p.w,p.h,p.pal);ctx.restore();
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.5;p.life-=1.8;p.rot+=p.vr;
  });
}

/* ── SPEED TIERS ──
   speed range   coin multiplier   label
   < 6           ×1                —
   6–9           ×2                RÁPIDO
   9–13          ×3                VELOZ
   13–17         ×5                TURBO
   ≥ 17          ×10               INSANO
*/
function coinMultiplier(){
  if(speed>=17) return {mult:10,label:'🔥 INSANO! ×10'  ,color:'#ff3f5e'};
  if(speed>=13) return {mult:5, label:'⚡ TURBO ×5'     ,color:'#f5c842'};
  if(speed>=9)  return {mult:3, label:'💨 VELOZ ×3'     ,color:'#3ecf8e'};
  if(speed>=6)  return {mult:2, label:'🚀 RÁPIDO ×2'    ,color:'#5b8af5'};
  return            {mult:1, label:null, color:'#f5c842'};
}

function spawnCoinPop(coins,color){
  const pop=document.createElement('div');
  pop.style.cssText=`position:fixed;left:50%;top:30%;transform:translateX(-50%);
    font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:${color};
    text-shadow:0 0 18px ${color};pointer-events:none;z-index:999;
    animation:coinpop .75s ease-out forwards;white-space:nowrap`;
  pop.textContent=`+${coins} 🪙`;
  document.body.appendChild(pop);
  setTimeout(()=>pop.remove(),800);
}

function drop(){
  if(!running||!mover)return;
  const top=stackBlocks[stackBlocks.length-1];
  const lE=Math.max(mover.x,top.x),rE=Math.min(mover.x+mover.w,top.x+top.w);
  const ov=rE-lE;
  if(ov<=2){triggerFall();return;}
  const PERF=8;
  let fx=lE,fw=ov;
  let isPerfect=false;
  if(ov>=mover.w-PERF){fx=top.x+(top.w-mover.w)/2;fw=mover.w;pFlash=34;isPerfect=true;}
  stackBlocks.push({wy:top.wy-mover.h-GAP,x:fx,w:fw,h:mover.h,devId:mover.devId,pal:mover.pal});
  score++;

  const {mult,label,color}=coinMultiplier();
  const earned=isPerfect?mult*2:mult; // perfect drop doubles coins
  coinsEarned+=earned;S.coins+=earned;ws(S);
  spawnCoinPop(earned,color);
  if(label){showSpeedLabel(label,color);}

  // faster ramp: goes higher and quicker
  speed=Math.min(2.6+score*0.22,22);
  updHUD();
  document.getElementById('hint').style.display='none';
  dir=dir===1?-1:1;
  spawnMover();
}

let lastLabelShown='';
function showSpeedLabel(label,color){
  if(label===lastLabelShown)return; // don't repeat same tier
  lastLabelShown=label;
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;left:50%;top:20%;transform:translateX(-50%);
    font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.1em;color:${color};
    text-shadow:0 0 30px ${color};pointer-events:none;z-index:999;
    animation:coinpop .9s ease-out forwards;white-space:nowrap`;
  el.textContent=label;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),950);
}

function updHUD(){
  document.getElementById('hscore').textContent=score;
  document.getElementById('hlevel').textContent=Math.floor(score/5)+1;
  document.getElementById('hcoins').textContent=S.coins.toLocaleString();
  // speed badge
  const {mult,label,color}=coinMultiplier();
  const badge=document.getElementById('speed-badge');
  if(mult>1&&label){
    badge.style.display='inline-block';
    badge.textContent=label;
    badge.style.background=color+'22';
    badge.style.border=`1px solid ${color}66`;
    badge.style.color=color;
  } else {
    badge.style.display='none';
  }
  // mini device preview in HUD
  const dev=equippedDev();
  document.getElementById('hud-devname').textContent=dev.name;
  const hcv=document.getElementById('hud-devcv');
  const hc=hcv.getContext('2d');
  hc.clearRect(0,0,60,28);
  const pals=DEVPALS[dev.id];
  DRAWERS[dev.id](hc,2,2,56,24,PAL[pals[0]]);
}

function triggerFall(){
  running=false;cancelAnimationFrame(rafId);
  stackBlocks.forEach(b=>{
    const sy=toSY(b.wy);
    for(let j=0;j<2;j++)particles.push({
      x:b.x+Math.random()*b.w,y:sy+Math.random()*b.h,
      w:b.w*(.5+Math.random()*.5),h:b.h,
      vx:(Math.random()-.5)*10,vy:-Math.random()*6-1,
      devId:b.devId,pal:b.pal,
      life:80+Math.random()*40,rot:Math.random()*Math.PI*2,vr:(Math.random()-.5)*.22
    });
  });
  let t=0;
  function fl(){
    ctx.clearRect(0,0,W,H);
    particles=particles.filter(p=>p.life>0);
    particles.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=Math.max(0,p.life/100);
      DRAWERS[p.devId](ctx,-p.w/2,-p.h/2,p.w,p.h,p.pal);ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.55;p.life-=1.7;p.rot+=p.vr;
    });
    if(++t<110)requestAnimationFrame(fl);
    else showOver();
  }
  requestAnimationFrame(fl);
}

function showOver(){
  addLB(playerName,score);
  document.getElementById('ovscore').textContent=score;
  document.getElementById('ovcoins').textContent=coinsEarned;
  document.getElementById('ovname').textContent=playerName.toUpperCase();
  rendLB('lb1');showScreen('sover');
}

function showScreen(id){['sstart','sgame','sshop','sover'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id));}
function openShop(from){shopFrom=from;rendShop();showScreen('sshop');document.querySelector('.shopwrap').scrollTop=0;}

/* ══ EVENTS ══ */
document.getElementById('cwrap').addEventListener('click',drop);
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();drop();}});
document.getElementById('bstart').addEventListener('click',()=>{
  playerName=document.getElementById('pname').value.trim()||'Anónimo';
  showScreen('sgame');setTimeout(initGame,50);
});
document.getElementById('pname').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('bstart').click();});
document.getElementById('bshophud').addEventListener('click',()=>openShop('sgame'));
document.getElementById('bshopover').addEventListener('click',()=>openShop('sover'));
document.getElementById('bshopclose').addEventListener('click',()=>{updHUD();showScreen(shopFrom);});
document.getElementById('bretry').addEventListener('click',()=>{showScreen('sgame');setTimeout(initGame,50);});
document.getElementById('bmenu').addEventListener('click',()=>{running=false;cancelAnimationFrame(rafId);rendLB('lb0');showScreen('sstart');});
window.addEventListener('resize',()=>{
  if(!document.getElementById('sgame').classList.contains('hidden'))resize();
  initBG();
});

rendLB('lb0');showScreen('sstart');initBG();
</script>
