<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#07071a">
<title>STACK! — Galeria CICF</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #07071a;
    --surface: #0f0f2e;
    --surface2: #161640;
    --accent: #00f5c4;
    --accent2: #ff4db8;
    --accent3: #ffe14d;
    --accent4: #6c8cff;
    --text: #e8e8ff;
    --muted: #6666aa;
    --nav-h: 124px;
    --disk-w: 86px;
    --disk-h: 100px;
  }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
  }

  .navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--surface);
    border-bottom: 1px solid var(--surface2);
    display: flex;
    align-items: center;
    z-index: 10;
  }

  .brand {
    display: flex;
    align-items: center;
    padding: 0 18px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: 0.08em;
    color: var(--accent);
    border-right: 1px solid var(--surface2);
    height: 60%;
    flex-shrink: 0;
    user-select: none;
  }

  .disks {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-evenly;
    gap: 10px;
    padding: 0 14px;
    height: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    white-space: nowrap;
    scrollbar-width: thin;
    scrollbar-color: var(--surface2) transparent;
  }
  .disks::-webkit-scrollbar { height: 6px; }
  .disks::-webkit-scrollbar-track { background: transparent; }
  .disks::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
  .brand .dot { color: var(--accent2); margin-left: 2px; }

  .disk {
    --body: var(--accent);
    position: relative;
    width: var(--disk-w);
    height: var(--disk-h);
    background: var(--body);
    border: 0;
    border-radius: 3px 9px 3px 3px;
    padding: 6px 5px 5px 5px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    flex-shrink: 0;
    font-family: 'Space Mono', monospace;
    transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.15s ease;
    box-shadow:
      inset 0 -2px 0 rgba(0,0,0,0.18),
      inset 2px 0 0 rgba(255,255,255,0.12),
      0 2px 4px rgba(0,0,0,0.4);
  }
  .disk:hover {
    transform: translateY(-3px);
    filter: brightness(1.08);
  }
  .disk:focus-visible {
    outline: 2px solid var(--text);
    outline-offset: 2px;
  }

  .disk .shutter {
    height: 28px;
    background: linear-gradient(180deg, #c8c8d2 0%, #9a9aa8 100%);
    border-radius: 2px;
    position: relative;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.5),
      inset 0 -1px 0 rgba(0,0,0,0.3);
  }
  .disk .shutter::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 6px;
    transform: translateX(-50%);
    width: 60%;
    height: 14px;
    background: #2a2a3a;
    border-radius: 1px;
    box-shadow: inset 0 1px 1px rgba(0,0,0,0.6);
  }
  .disk .shutter::after {
    content: '';
    position: absolute;
    right: 6px;
    bottom: 3px;
    width: 4px;
    height: 4px;
    background: #2a2a3a;
    border-radius: 50%;
  }

  .disk .label {
    flex: 1;
    background: #f5f1d6;
    border-radius: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 10px;
    line-height: 1.15;
    color: #1a1a2a;
    padding: 3px 4px;
    font-weight: 700;
    letter-spacing: 0.01em;
    white-space: normal;
    overflow: hidden;
    word-break: break-word;
    box-shadow:
      inset 0 1px 0 rgba(0,0,0,0.08),
      inset 0 -1px 0 rgba(255,255,255,0.6);
  }

  .disk.active {
    transform: translateY(-3px);
    filter: brightness(1.12);
    box-shadow:
      inset 0 -2px 0 rgba(0,0,0,0.18),
      inset 2px 0 0 rgba(255,255,255,0.12),
      0 0 0 2px var(--body),
      0 0 18px color-mix(in srgb, var(--body) 60%, transparent),
      0 4px 8px rgba(0,0,0,0.5);
  }
  .disk.active .label {
    background: #fffce0;
    color: #000;
  }

  .frame-wrap {
    position: absolute;
    top: var(--nav-h);
    left: 0; right: 0; bottom: 0;
    background: var(--bg);
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
</style>
</head>
<body>
  <nav class="navbar">
    <div class="brand">STACK<span class="dot">!</span></div>
    <div class="disks" id="disks"></div>
  </nav>
  <div class="frame-wrap">
    <iframe id="frame" title="STACK! game" allow="fullscreen"></iframe>
  </div>

<script>
  const C = {
    yellow: '#ffe14d',
    teal:   '#00f5c4',
    pink:   '#ff4db8',
    blue:   '#6c8cff',
    orange: '#ff8a3d',
    lime:   '#b6ff4d',
  };

  const games = [
    { id: 'original', label: 'Original',         src: 'original/',        color: C.yellow },
    { id: 'afonso',   label: 'Afonso Mesquita',  src: 'AfonsoMesquita/',  color: C.teal },
    { id: 'goncalo',  label: 'Gonçalo Mesquita', src: 'GoncaloMesquita/', color: C.pink },
    { id: 'gustavo',  label: 'Gustavo Folha',    src: 'GustavoFolha/v2/', color: C.blue },
    { id: 'leandro',  label: 'Leandro',          src: 'Leandro/',         color: C.orange },
    { id: 'miguel',   label: 'Miguel Freitas',   src: 'MiguelFreitas/',   color: C.lime },
    { id: 'pedrol',   label: 'Pedro Lourenço',   src: 'PedroLourenco/',   color: C.teal },
    { id: 'pedrom',   label: 'Pedro Marques',    src: 'PedroMarques/',    color: C.pink },
  ];

  const disksEl = document.getElementById('disks');
  const frame = document.getElementById('frame');
  const buttons = {};

  games.forEach(g => {
    const b = document.createElement('button');
    b.className = 'disk';
    b.style.setProperty('--body', g.color);
    b.dataset.id = g.id;
    b.setAttribute('aria-label', g.label);

    const shutter = document.createElement('div');
    shutter.className = 'shutter';

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = g.label;

    b.appendChild(shutter);
    b.appendChild(label);
    b.addEventListener('click', () => select(g.id));
    disksEl.appendChild(b);
    buttons[g.id] = b;
  });

  function select(id) {
    const g = games.find(x => x.id === id) || games[0];
    Object.values(buttons).forEach(b => b.classList.remove('active'));
    buttons[g.id].classList.add('active');
    if (frame.dataset.id !== g.id) {
      frame.src = g.src;
      frame.dataset.id = g.id;
    }
    if (location.hash.slice(1) !== g.id) {
      history.replaceState(null, '', '#' + g.id);
    }
    buttons[g.id].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
  }

  const initial = location.hash.slice(1);
  select(games.some(g => g.id === initial) ? initial : 'original');

  window.addEventListener('hashchange', () => {
    const id = location.hash.slice(1);
    if (games.some(g => g.id === id)) select(id);
  });
</script>
</body>
</html>
